name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to build"
        required: true
        default: "dev"
        type: choice
        options: [dev, prod]

jobs:
  # ─── Android APK ────────────────────────────────────────────────────────────
  build-android:
    name: Build APK (${{ github.event.inputs.environment || 'dev' }})
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > upload-keystore.jks

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK (Dev)
        if: ${{ github.event.inputs.environment != 'prod' }}
        run: flutter build apk --debug --target lib/main_dev.dart

      - name: Build APK (Prod)
        if: ${{ github.event.inputs.environment == 'prod' }}
        run: flutter build apk --release --target lib/main_prod.dart

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.event.inputs.environment || 'dev' }}-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 14

  # ─── iOS IPA ────────────────────────────────────────────────────────────────
  build-ios:
    name: Build IPA (${{ github.event.inputs.environment || 'dev' }})
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: cd ios && pod install --repo-update

      - name: Build IPA (Dev)
        if: ${{ github.event.inputs.environment != 'prod' }}
        run: flutter build ipa --target lib/main_dev.dart --no-codesign

      - name: Build IPA (Prod)
        if: ${{ github.event.inputs.environment == 'prod' }}
        run: flutter build ipa --release --target lib/main_prod.dart --no-codesign

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipa-${{ github.event.inputs.environment || 'dev' }}-${{ github.run_number }}
          path: build/ios/ipa/*.ipa
          retention-days: 14
